<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credamo WoZ Chatbot Preview</title>
</head>
<body style="margin: 0; background: #f4f6f8;">
  <div style="max-width: 760px; margin: 24px auto; padding: 0 16px;">
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin-bottom: 12px; color: #333; line-height: 1.6;">
      预览版，点击切换。
    </div>

    <div id="preview-controls" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;"></div>

    <iframe
      id="woz-preview-frame"
      src="./credamo_chatbot_woz_embed_snippet.html?topicId=T01&aiCondition=sycophancy&userStance=support&typingDelayMs=2200"
      title="WoZ Preview"
      style="width: 100%; height: 620px; border: none; border-radius: 12px; background: #fff;"></iframe>
  </div>

  <script>
    const cases = [
      { label: "T01 支持-谄媚", topicId: "T01", aiCondition: "sycophancy", userStance: "support" },
      { label: "T01 支持-中立", topicId: "T01", aiCondition: "neutral", userStance: "support" },
      { label: "T02 反对-谄媚", topicId: "T02", aiCondition: "sycophancy", userStance: "oppose" },
      { label: "T02 反对-中立", topicId: "T02", aiCondition: "neutral", userStance: "oppose" },
      { label: "T03 支持-谄媚", topicId: "T03", aiCondition: "sycophancy", userStance: "support" },
      { label: "T03 支持-中立", topicId: "T03", aiCondition: "neutral", userStance: "support" },
      { label: "T04 反对-谄媚", topicId: "T04", aiCondition: "sycophancy", userStance: "oppose" },
      { label: "T04 反对-中立", topicId: "T04", aiCondition: "neutral", userStance: "oppose" }
    ];

    const controls = document.getElementById("preview-controls");
    const frame = document.getElementById("woz-preview-frame");

    cases.forEach(function (item) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = item.label;
      button.style.padding = "8px 12px";
      button.style.borderRadius = "999px";
      button.style.border = "1px solid #cfd6df";
      button.style.background = "#fff";
      button.style.cursor = "pointer";
      button.onclick = function () {
        const params = new URLSearchParams({
          topicId: item.topicId,
          aiCondition: item.aiCondition,
          userStance: item.userStance,
          typingDelayMs: "2200"
        });
        frame.src = "./credamo_chatbot_woz_embed_snippet.html?" + params.toString();
      };
      controls.appendChild(button);
    });
  </script>
</body>
</html>
